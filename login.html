<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Dashboard Sabesp</title>
  <style>
    :root{
      --bg:#081120;
      --text:#eaf2ff;
      --muted:#a9bad3;
      --accent:#2F7CFF;
      --accent2:#22D3EE;
      --border:rgba(148,163,184,.14);
      --danger:#ff5c7a;
      --ok:#2dd4bf;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(47,124,255,.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(34,211,238,.14), transparent 24%),
        linear-gradient(180deg, #07101d 0%, #0a1628 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .login-wrap{
      width:100%;
      max-width:520px;
    }

    .login-card{
      background:
        linear-gradient(180deg, rgba(16,29,48,.94), rgba(11,22,37,.96));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:30px;
      backdrop-filter: blur(8px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:28px;
    }

    .brand-logo{
      width:128px;
      height:128px;
      object-fit:contain;
      flex:0 0 auto;
      display:block;
    }

    .brand h1{
      margin:0;
      font-size:28px;
      line-height:1.15;
      letter-spacing:.2px;
    }

    .brand p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .field{
      margin-bottom:16px;
    }

    .field label{
      display:block;
      margin:0 0 8px;
      color:#dfe9ff;
      font-size:14px;
      font-weight:600;
    }

    .field input{
      width:100%;
      height:50px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.16);
      background:rgba(8,18,32,.88);
      color:var(--text);
      padding:0 14px;
      outline:none;
      font-size:15px;
    }

    .field input:focus{
      border-color:rgba(47,124,255,.72);
      box-shadow:0 0 0 4px rgba(47,124,255,.12);
    }

    .actions{
      display:flex;
      gap:12px;
      margin-top:20px;
    }

    .btn{
      border:none;
      border-radius:14px;
      height:48px;
      padding:0 18px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
    }

    .btn-primary{
      flex:1;
      color:#fff;
      background:linear-gradient(135deg, var(--accent), #2563eb);
    }

    .btn-primary:hover{
      filter:brightness(1.05);
    }

    .btn-secondary{
      background:rgba(9,19,32,.9);
      color:#dbe7ff;
      border:1px solid rgba(148,163,184,.16);
    }

    .message{
      margin-top:16px;
      min-height:22px;
      font-size:14px;
      color:var(--muted);
    }

    .message.error{ color:var(--danger); }
    .message.success{ color:var(--ok); }

    .footer-note{
      margin-top:18px;
      font-size:12px;
      color:var(--muted);
      opacity:.9;
    }

    @media (max-width: 640px){
      .login-wrap{ max-width:440px; }
      .login-card{ padding:24px; }
      .brand{
        gap:14px;
        align-items:center;
      }
      .brand-logo{
        width:96px;
        height:96px;
      }
      .brand h1{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <img src="./yssy_logo.png" alt="Yssy" class="brand-logo" />
        <div>
          <h1>Dashboard Sabesp</h1>
          <p>Acesso restrito ao painel</p>
        </div>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="usuario">Usuário</label>
          <input id="usuario" name="usuario" type="text" autocomplete="username" placeholder="Digite seu usuário" required />
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" autocomplete="current-password" placeholder="Digite sua senha" required />
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="btnEntrar">Entrar</button>
          <button type="button" class="btn btn-secondary" id="btnLimpar">Limpar</button>
        </div>

        <div id="message" class="message"></div>
      </form>

      <div class="footer-note">
        Autenticação simples via Google Sheets + Apps Script.
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'COLE_AQUI_A_URL_DO_SEU_APPS_SCRIPT_EXEC';
    const STORAGE_KEY = 'dashboard_auth_session';

    const form = document.getElementById('loginForm');
    const usuarioInput = document.getElementById('usuario');
    const senhaInput = document.getElementById('senha');
    const btnEntrar = document.getElementById('btnEntrar');
    const btnLimpar = document.getElementById('btnLimpar');
    const messageEl = document.getElementById('message');

    function setMessage(text, type = '') {
      messageEl.textContent = text || '';
      messageEl.className = 'message' + (type ? ' ' + type : '');
    }

    function setLoading(isLoading) {
      btnEntrar.disabled = isLoading;
      btnEntrar.textContent = isLoading ? 'Entrando...' : 'Entrar';
    }

    function salvarSessao(data) {
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
        logado: true,
        usuario: data.usuario || '',
        nome: data.nome || '',
        perfil: data.perfil || '',
        loginEm: new Date().toISOString()
      }));
    }

    function jaEstaLogado() {
      try {
        const raw = sessionStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        return !!(data && data.logado);
      } catch {
        return false;
      }
    }

    async function fazerLogin(usuario, senha) {
      const resp = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action: 'login',
          usuario,
          senha
        })
      });

      const data = await resp.json();
      return data;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const usuario = usuarioInput.value.trim();
      const senha = senhaInput.value.trim();

      if (!usuario || !senha) {
        setMessage('Informe usuário e senha.', 'error');
        return;
      }

      setMessage('');
      setLoading(true);

      try {
        const data = await fazerLogin(usuario, senha);

        if (data.success) {
          salvarSessao(data);
          setMessage('Login realizado com sucesso. Redirecionando...', 'success');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 500);
        } else {
          setMessage(data.message || 'Falha no login.', 'error');
        }
      } catch (err) {
        setMessage('Não foi possível conectar à API de login.', 'error');
        console.error(err);
      } finally {
        setLoading(false);
      }
    });

    btnLimpar.addEventListener('click', () => {
      usuarioInput.value = '';
      senhaInput.value = '';
      setMessage('');
      usuarioInput.focus();
    });

    if (jaEstaLogado()) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
